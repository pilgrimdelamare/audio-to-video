name: Render Video

on:
  workflow_dispatch:
    inputs:
      audio_url:
        description: "Audio file URL (MP3)"
        required: true
      cover_url:
        description: "Cover image URL (JPG/PNG)"
        required: true
      title:
        description: "Song title"
        required: true
      genre:
        description: "Genre"
        required: true
      song_id:
        description: "Job identifier"
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Download audio and cover
        run: |
          curl -sL "${{ github.event.inputs.audio_url }}" -o audio.mp3
          curl -sL "${{ github.event.inputs.cover_url }}" -o cover.jpg
          echo "Audio: $(du -sh audio.mp3)"
          echo "Cover: $(du -sh cover.jpg)"

      - name: Render video
        run: |
          python render.py             --audio audio.mp3             --cover cover.jpg             --title "${{ github.event.inputs.title }}"             --genre "${{ github.event.inputs.genre }}"             --output output.mp4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.event.inputs.song_id }}
          path: output.mp4
          retention-days: 1
